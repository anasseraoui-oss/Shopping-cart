---
- name: Déploiement Shopping Cart avec Ansible
  hosts: webservers
  become: no
  connection: ssh

  vars:
    app_name: shopping-cart
    app_port: 8070
    mgmt_port: 8071
    docker_image: "anasseraoui/shopping-cart:latest"
    docker_network: "ansible-network"

  tasks:
    - name: 1. Vérifier que Docker est disponible
      command: docker --version
      changed_when: false

    - name: 2. Nettoyage - Arrêter l'ancien conteneur s'il existe
      shell: "docker stop {{ app_name }} || true"

    - name: 3. Nettoyage - Supprimer l'ancien conteneur s'il existe
      shell: "docker rm {{ app_name }} || true"

    - name: 4. Pull - Télécharger la dernière image depuis Docker Hub
      shell: "docker pull {{ docker_image }}"

    - name: 5. Run - Lancer le conteneur Spring Boot sur ansible-network
      shell: |
        docker run -d \
          --name {{ app_name }} \
          --network {{ docker_network }} \
          -p {{ app_port }}:8070 \
          -p {{ mgmt_port }}:8071 \
          --restart always \
          {{ docker_image }}

    - name: 6. Vérifier que le conteneur tourne
      shell: "docker ps --filter name={{ app_name }} --format '{{ '{{' }}.Status{{ '}}' }}'"
      register: container_status

    - name: 7. Afficher le statut du conteneur
      debug:
        msg: "Conteneur {{ app_name }} : {{ container_status.stdout }}"