---
- name: Déploiement Shopping Cart avec Ansible
  hosts: webservers
  become: yes          # Requis pour installer des paquets et gérer Docker
  connection: ssh

  vars:
    app_name: shopping-cart
    app_port: 8070
    docker_image: "anasseraoui/shopping-cart:latest"

  tasks:
    - name: 1. Vérifier si Docker est déjà installé
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false

    - name: 2. Installer Docker si absent (Ubuntu/Debian)
      apt:
        name: docker.io
        state: present
        update_cache: yes
      when: docker_check.rc != 0

    - name: 3. S'assurer que le service Docker est démarré
      service:
        name: docker
        state: started
        enabled: yes
      when: docker_check.rc != 0

    - name: 4. Nettoyage - Arrêter l'ancien conteneur s'il existe
      shell: "docker stop {{ app_name }} || true"

    - name: 5. Nettoyage - Supprimer l'ancien conteneur s'il existe
      shell: "docker rm {{ app_name }} || true"

    - name: 6. Pull - Télécharger la dernière version de l'image depuis Docker Hub
      shell: "docker pull {{ docker_image }}"

    - name: 7. Run - Lancer le conteneur Spring Boot
      shell: |
        docker run -d \
          --name {{ app_name }} \
          -p {{ app_port }}:8070 \
          -p 8071:8071 \
          --restart always \
          {{ docker_image }}